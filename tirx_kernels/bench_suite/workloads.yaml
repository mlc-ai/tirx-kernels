# bench-suite workloads — curated sweep for `python -m tirx_kernels.bench_suite`.
# Edit freely. Run `python -m tirx_kernels.registry --format=benchrun --cc 10` to see the full set.

defaults:
  # Intentionally empty: warmup/repeat/timer all defer to each kernel's run_bench
  # defaults. The global default timer is `proton` (resolved from timer=None in
  # tvm.tirx.bench.bench) -- pure per-kernel GPU time, cold-cache (per-iter L2 flush),
  # honest for host-dispatch-heavy references; auto-falls back to `event` (do_bench
  # CUDA-event wall) when Proton/CUPTI is unavailable. `cudagraph_proton` (graph replay
  # + Proton) is also selectable but no longer any kernel's default.
  # Override warmup/repeat/timer per-workload only for a specific exception.

